name:                Xenon2-Megablast
version:             0.1.0.0
github:              "https://github.com/00David/Xenon-2-Megablast"
license:             BSD-3-Clause
author:              "David Vadimon"
maintainer:          "example@example.com"
copyright:           "2026 David Vadimon"

extra-source-files:
- README.md
- CHANGELOG.md

# Metadata used when publishing your package
# synopsis:            Short description of your package
# category:            Web

# To avoid duplicated efforts in documentation and dealing with the
# complications of embedding Haddock markup inside cabal files, it is
# common to point users to the README.md file.
description:         Please see the README on GitHub at <https://github.com/00David/Xenon-2-Megablast#readme>

dependencies:
- base >= 4.7 && < 5
- containers
- gloss
- random

ghc-options:
- -Wall
- -Wcompat
- -Widentities
- -Wincomplete-record-updates
- -Wincomplete-uni-patterns
- -Wmissing-export-lists
- -Wmissing-home-modules
- -Wpartial-fields
- -Wredundant-constraints

library:
  source-dirs: src

executables:
  Xenon2-Megablast-exe:
    main:                Main.hs
    source-dirs:         app
    ghc-options:
    - -threaded
    - -rtsopts
    - -with-rtsopts=-N
    dependencies:
    - Xenon2-Megablast

tests:
  Xenon2-Megablast-test:
    main:                Spec.hs
    source-dirs:         test
    ghc-options:
    - -threaded
    - -rtsopts
    - -with-rtsopts=-N
    - -fwrite-ide-info
    - -hiedir=.hie
    dependencies:
    - Xenon2-Megablast
